# CodeZero Helm Chart Values
# https://codezero.build

# -- Global image settings
image:
  registry: registry.gitlab.com/code0-tech/packages
  tag: "0.0.0-canary-2356067148-c06e576791513b10dbcb10aa3b0420b87178a205"
  edition: "ee"  # ce (community) or ee (enterprise)
  pullPolicy: IfNotPresent

# -- Initial admin credentials
admin:
  password: "root"
  email: "root@code0.tech"

# -- PostgreSQL (Bitnami subchart)
postgres:
  enabled: true  # set to false to use an external database

postgresql:
  auth:
    database: sagittarius_production
    username: sagittarius
    # password is auto-generated by Bitnami if not set — stored in a K8s Secret
    # To set explicitly: password: "your-password"
    # To use an existing secret: existingSecret: "my-pg-secret"
  primary:
    persistence:
      size: 10Gi
      # storageClass: ""  # uses default if not set
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# -- NATS (message broker for runtime)
nats:
  image: nats:2.11.9

# -- Nginx (reverse proxy)
nginx:
  image: nginx:1.29.5-alpine-slim

# -- HTTP settings
http:
  port: 80

# -- Runtime settings
runtime:
  # -- Enable the runtime profile (workflow execution engine)
  enabled: true
  # -- Aquila connection to sagittarius
  aquila:
    sagittariusUrl: ""  # auto-configured if empty
    sagittariusToken: ""
  # -- Draco REST trigger
  draco:
    rest:
      port: 8084

# -- Resource defaults
resources:
  sagittarius:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  sculptor:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Service account
serviceAccount:
  create: true
  name: ""

# -- Pod security
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
