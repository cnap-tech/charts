apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-config
  labels:
    {{- include "codezero.labels" . | nindent 4 }}
data:
  default.conf: |
    upstream sagittarius_rails_web {
      server {{ .Release.Name }}-sagittarius-web:3000;
    }

    upstream sagittarius_grpc {
      server {{ .Release.Name }}-sagittarius-grpc:50051;
    }

    upstream sculptor {
      server {{ .Release.Name }}-sculptor:3000;
    }

    server {
      listen 80 http2;
      server_name _;

      location = /graphql {
        proxy_pass http://sagittarius_rails_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location = /files/upload {
        proxy_pass http://sagittarius_rails_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
      }

      location = /health/liveness {
        proxy_pass http://sagittarius_rails_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /good_job {
        proxy_pass http://sagittarius_rails_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location = /error502grpc {
        internal;
        default_type application/grpc;
        add_header grpc-status 14;
        add_header grpc-message "unavailable";
        return 204;
      }

      location / {
        if ($content_type = "application/grpc") {
          grpc_pass grpc://sagittarius_grpc;
          error_page 502 = /error502grpc;
        }
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        grpc_read_timeout 1h;
        grpc_send_timeout 1h;
        grpc_socket_keepalive on;

        proxy_pass http://sculptor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
